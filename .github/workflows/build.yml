name: Build

# All build/release/cleanup behavior reads its configuration from builder.yml.
# The cron schedule below is the only knob that cannot be expressed there
# (GitHub Actions cron values must be static strings in this file).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - builder.yml
      - 'devices/**'
      - 'common/**'
      - 'patches/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  schedule:
    - cron: "0 */2 * * *"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  config:
    name: Load builder.yml
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      upstream_repo: ${{ steps.cfg.outputs.upstream_repo }}
      upstream_branch: ${{ steps.cfg.outputs.upstream_branch }}
      nss_repo: ${{ steps.cfg.outputs.nss_repo }}
      nss_branch: ${{ steps.cfg.outputs.nss_branch }}
      device: ${{ steps.cfg.outputs.device }}
      device_dir: ${{ steps.cfg.outputs.device_dir }}
      release_prefix: ${{ steps.cfg.outputs.release_prefix }}
      release_keep: ${{ steps.cfg.outputs.release_keep }}
      artifact_retention_days: ${{ steps.cfg.outputs.artifact_retention_days }}
      feeds_lines: ${{ steps.cfg.outputs.feeds_lines }}
    steps:
      - uses: actions/checkout@v6
      - id: cfg
        run: bash scripts/load-config.sh

  check-updates:
    name: Check upstream
    needs: config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      UPSTREAM_REPO: ${{ needs.config.outputs.upstream_repo }}
      UPSTREAM_BRANCH: ${{ needs.config.outputs.upstream_branch }}
      NSS_REPO: ${{ needs.config.outputs.nss_repo }}
      NSS_BRANCH: ${{ needs.config.outputs.nss_branch }}
    outputs:
      build_required: ${{ steps.check.outputs.build_required }}
      main_sha: ${{ steps.check.outputs.main_sha }}
      nss_sha: ${{ steps.check.outputs.nss_sha }}
    steps:
      - id: check
        run: |
          set -euo pipefail
          main_sha=$(gh api "repos/${UPSTREAM_REPO}/commits/${UPSTREAM_BRANCH}" --jq .sha)
          nss_sha=$(gh api "repos/${NSS_REPO}/commits/${NSS_BRANCH}" --jq .sha)

          latest_release_body=$(gh release view --repo "${GITHUB_REPOSITORY}" --json body --jq .body 2>/dev/null || echo "")

          build_required=true
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]] \
             && [[ "$latest_release_body" == *"$main_sha"* ]] \
             && [[ "$latest_release_body" == *"$nss_sha"* ]]; then
            build_required=false
          fi

          {
            echo "## Upstream check"
            echo "- upstream: \`${UPSTREAM_REPO}@${UPSTREAM_BRANCH}\` -> \`${main_sha}\`"
            echo "- nss:      \`${NSS_REPO}@${NSS_BRANCH}\` -> \`${nss_sha}\`"
            echo "- build_required: **${build_required}**"
          } >>"$GITHUB_STEP_SUMMARY"

          {
            echo "build_required=$build_required"
            echo "main_sha=$main_sha"
            echo "nss_sha=$nss_sha"
          } >>"$GITHUB_OUTPUT"

  build:
    name: Build firmware (${{ matrix.nss_version }})
    needs: [config, check-updates]
    if: needs.check-updates.outputs.build_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      actions: read

    # KROK A: Definicja Macierzy dla nss_12.5 oraz nss_11.4
    strategy:
      matrix:
        nss_version: [nss_12.5, nss_11.4]
      fail-fast: false

    env:
      GH_TOKEN: ${{ github.token }}
      MAIN_SHA: ${{ needs.check-updates.outputs.main_sha }}
      NSS_SHA: ${{ needs.check-updates.outputs.nss_sha }}
      DEVICE: ${{ needs.config.outputs.device }}
      DEVICE_DIR: ${{ needs.config.outputs.device_dir }}
      RELEASE_PREFIX: ${{ needs.config.outputs.release_prefix }}-${{ matrix.nss_version }}
      ARTIFACT_RETENTION_DAYS: ${{ needs.config.outputs.artifact_retention_days }}
      FEEDS_LINES: ${{ needs.config.outputs.feeds_lines }}
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Start tmate session in background
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          detached: true

      - name: Checkout OpenWrt source
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.config.outputs.upstream_repo }}
          ref: ${{ env.MAIN_SHA }}
          fetch-depth: 0
          path: openwrt

      - name: Checkout builder repo
        uses: actions/checkout@v6
        with:
          path: builder

      # KROK B: Dynamiczne ustawianie wersji NSS Firmware w pliku .config
      - name: Tweak config for selected NSS Firmware version
        run: |
          set -euo pipefail
          CONFIG_FILE="builder/${{ env.DEVICE_DIR }}/config"
          if [ -f "$CONFIG_FILE" ]; then
            # Wyczyszczenie dotychczasowych flag wersji NSS, aby nie było konfliktów
            sed -i '/CONFIG_NSS_FIRMWARE_VERSION_/d' "$CONFIG_FILE"

            # Wstrzyknięcie odpowiedniej flagi na podstawie wybranego wariantu macierzy nss_11.4 oraz modułów NSS i pakietów
            if [ "${{ matrix.nss_version }}" = "nss_11.4" ]; then
              {
                echo "CONFIG_NSS_FIRMWARE_VERSION_11_4=y"
                echo "CONFIG_IPQ_MEM_PROFILE_512=y"
                echo "CONFIG_KERNEL_IPQ_MEM_PROFILE=512"
                echo "CONFIG_PACKAGE_kmod-qca-mcs=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-gre=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-igs=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-lag-mgr=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-map-t=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-pppoe=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-pptp=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-qdisc=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-tun6rd=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-tunipip6=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-vxlanmgr=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-wifi-meshmgr=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-bridge-mgr=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-vlan-mgr=y"
                echo "CONFIG_ALL_KMODS=y"
                echo "CONFIG_ALL_NONSHARED=y"
                echo "CONFIG_PACKAGE_ip-bridge=y"
                echo "CONFIG_PACKAGE_ip-full=y"
                echo "CONFIG_PACKAGE_ipset=m"
                echo "CONFIG_PACKAGE_iptables-mod-conntrack-extra=y"
                echo "CONFIG_PACKAGE_kmod-bonding=y"
                echo "CONFIG_PACKAGE_kmod-crypto-kpp=y"
                echo "CONFIG_PACKAGE_kmod-crypto-lib-chacha20=y"
                echo "CONFIG_PACKAGE_kmod-crypto-lib-chacha20poly1305=y"
                echo "CONFIG_PACKAGE_kmod-crypto-lib-curve25519=y"
                echo "CONFIG_PACKAGE_kmod-crypto-lib-poly1305=y"
                echo "CONFIG_PACKAGE_kmod-crypto-sha1=y"
                echo "CONFIG_PACKAGE_kmod-crypto-sha256=y"
                echo "CONFIG_PACKAGE_kmod-gre=y"
                echo "CONFIG_PACKAGE_kmod-ipt-conntrack=y"
                echo "CONFIG_PACKAGE_kmod-ipt-conntrack-extra=y"
                echo "# CONFIG_PACKAGE_kmod-ipt-rtpengine is not set"
                echo "CONFIG_PACKAGE_kmod-iptunnel=y"
                echo "CONFIG_PACKAGE_kmod-l2tp=y"
                echo "CONFIG_PACKAGE_kmod-nf-conncount=y"
                echo "CONFIG_PACKAGE_kmod-nft-bridge=y"
                echo "CONFIG_PACKAGE_kmod-pppol2tp=y"
                echo "CONFIG_PACKAGE_kmod-pptp=y"
                echo "CONFIG_PACKAGE_kmod-thermal=m"
                echo "CONFIG_PACKAGE_kmod-tls=y"
                echo "CONFIG_PACKAGE_kmod-udptunnel4=y"
                echo "CONFIG_PACKAGE_kmod-udptunnel6=y"
                echo "CONFIG_PACKAGE_kmod-vxlan=y"
                echo "CONFIG_PACKAGE_kmod-wireguard=y"
                echo "CONFIG_PACKAGE_libbpf=y"
                echo "CONFIG_PACKAGE_libcap=y"
                echo "CONFIG_PACKAGE_libcap-ng=y"
                echo "CONFIG_PACKAGE_libelf=y"
                echo "CONFIG_PACKAGE_libipset=m"
                echo "CONFIG_PACKAGE_libqrencode=y"
                echo "CONFIG_PACKAGE_libwebsockets-full=y"
                echo "CONFIG_PACKAGE_libxdp=m"
                echo "CONFIG_PACKAGE_libuv=y"
                echo "CONFIG_PACKAGE_libzstd=y"
                echo "CONFIG_PACKAGE_luci-app-mwan3=m"
                echo "CONFIG_PACKAGE_luci-app-ttyd=y"
                echo "CONFIG_PACKAGE_luci-app-upnp=y"
                echo "CONFIG_PACKAGE_luci-i18n-mwan3-pl=m"
                echo "CONFIG_PACKAGE_luci-i18n-ttyd-pl=y"
                echo "CONFIG_PACKAGE_luci-i18n-upnp-pl=y"
                echo "CONFIG_PACKAGE_luci-lib-base=y"
                echo "CONFIG_PACKAGE_luci-lib-ip=y"
                echo "CONFIG_PACKAGE_luci-lib-json=y"
                echo "CONFIG_PACKAGE_luci-lib-nixio=y"
                echo "CONFIG_PACKAGE_luci-lua-runtime=y"
                echo "CONFIG_PACKAGE_luci-mod-rpc=y"
                echo "CONFIG_PACKAGE_luci-proto-gre=y"
                echo "CONFIG_PACKAGE_luci-proto-vxlan=y"
                echo "CONFIG_PACKAGE_luci-proto-wireguard=y"
                echo "CONFIG_PACKAGE_map=y"
                echo "CONFIG_PACKAGE_mesh11sd=m"
                echo "CONFIG_PACKAGE_miniupnpd-nftables=y"
                echo "CONFIG_PACKAGE_mwan3=m"
                echo "CONFIG_PACKAGE_qca-ssdk-shell=y"
                echo "CONFIG_PACKAGE_qrencode=y"
                echo "CONFIG_PACKAGE_tc-full=y"
                echo "# CONFIG_PACKAGE_tc-tiny is not set"
                echo "CONFIG_PACKAGE_tcpdump=m"
                echo "CONFIG_PACKAGE_tcpdump-mini=m"
                echo "CONFIG_PACKAGE_ttyd=y"
                echo "CONFIG_PACKAGE_vxlan=y"
                echo "CONFIG_PACKAGE_wget-ssl=y"
                echo "CONFIG_PACKAGE_wireguard-tools=y"
                echo "CONFIG_PACKAGE_xdp-filter=m"
                echo "CONFIG_PACKAGE_xdp-loader=m"
                echo "CONFIG_PACKAGE_xdpdump=m"
                echo "CONFIG_PACKAGE_ds-lite=y"
                echo "CONFIG_PACKAGE_ethtool=y"
                echo "CONFIG_PACKAGE_gre=y"
              } >> "$CONFIG_FILE"
              echo "Successfully patched config with CONFIG_NSS_FIRMWARE_VERSION_11_4=y and add NSS modules + packages"
            else
              echo "CONFIG_NSS_FIRMWARE_VERSION_12_5=y" >> "$CONFIG_FILE"
              echo "Successfully patched config with CONFIG_NSS_FIRMWARE_VERSION_12_5=y"
            fi
          fi

      - name: Prepare build environment
        env:
          OPENWRT_DIR: ${{ github.workspace }}/openwrt
          BUILDER_REPO: ${{ github.workspace }}/builder
        run: bash builder/scripts/prepare-build.sh

      - name: Dynamically update custom OpenWrt banner info
        working-directory: openwrt
        run: |
          set -euo pipefail

          # 1. Wyciągnięcie prawdziwego numeru rewizji (np. r0+33880-0e751b1cb2) za pomocą skryptu OpenWrt
          if [ -f scripts/getver.sh ]; then
            OPENWRT_VERSION_RAW=$(bash scripts/getver.sh)
          else
            OPENWRT_VERSION_RAW=$(git rev-parse --short=10 HEAD)
          fi

          # Złożenie pełnej nazwy wersji tak, jak robi to oficjalny system
          OPENWRT_VERSION="OpenWrt SNAPSHOT, ${OPENWRT_VERSION_RAW}"

          # 2. Wygenerowanie aktualnej daty i godziny UTC
          CURRENT_BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")

          # 3. Dynamiczne sformatowanie i wyrównanie ramek w pliku banner
          if [ -f files/etc/banner ]; then
            VERSION_LINE="OpenWrt SNAPSHOT, ${OPENWRT_VERSION_RAW} (${{ matrix.nss_version }})"
            DATE_LINE="Build time: $CURRENT_BUILD_TIME"

            # KOREKTA SZEROKOŚCI RAMKI:
            # " | " (3 znaki) + %-74s (74 znaki na tekst i dopełniające spacje) + "|" (1 znak) = Łącznie 78 znaków.
            # Zwiększenie bufora do %-74s dodaje brakującą spację przed zamykającą kreską |.

            VERSION_PADDING=$(printf '%-74s' "$VERSION_LINE")
            FINAL_VERSION_ROW=" | ${VERSION_PADDING}|"

            DATE_PADDING=$(printf '%-74s' "$DATE_LINE")
            FINAL_DATE_ROW=" | ${DATE_PADDING}|"

            # Podmiana placeholderów w szablonie pliku banner
            sed -i "s#.*VERSION_PLACEHOLDER.*#$FINAL_VERSION_ROW#g" files/etc/banner
            sed -i "s#.*DATE_PLACEHOLDER.*#$FINAL_DATE_ROW#g" files/etc/banner

            echo "Successfully injected real git version and build time into banner."
          else
            echo "::warning::Custom banner file was not deployed by prepare-build.sh to openwrt/files/etc/banner"
            VERSION_LINE="OpenWrt SNAPSHOT"
            FINAL_VERSION_ROW=""
            DATE_LINE=""
            FINAL_DATE_ROW=""
          fi

          # 4. Aktualizacja informacji dla panelu WWW (LuCI)
          TARGET_RELEASE_FILE="package/base-files/files/etc/openwrt_release"
          DISTRIB_DESCRIPTION="${OPENWRT_VERSION} (${{ matrix.nss_version }} - NSS build by @Payti)"
          if [ -f "$TARGET_RELEASE_FILE" ]; then
            sed -i '/DISTRIB_DESCRIPTION=/d' "$TARGET_RELEASE_FILE"
            echo "DISTRIB_DESCRIPTION='${DISTRIB_DESCRIPTION}'" >> "$TARGET_RELEASE_FILE"
          fi

          # 5. Wyświetlenie wartości zmiennych w logach kompilacji
          echo "=================================================="
          echo "OPENWRT_VERSION:         $OPENWRT_VERSION"
          echo "CURRENT_BUILD_TIME:      $CURRENT_BUILD_TIME"
          echo "VERSION_LINE:            ${VERSION_LINE:-}"
          echo "DATE_LINE:               ${DATE_LINE:-}"
          echo "FINAL_VERSION_ROW:       ${FINAL_VERSION_ROW:-}"
          echo "FINAL_DATE_ROW:          ${FINAL_DATE_ROW:-}"
          echo "=================================================="

      - name: Set reproducible-build env
        working-directory: openwrt
        run: |
          set -euo pipefail
          {
            echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)"
            echo "TZ=UTC"
            echo "LC_ALL=C"
            echo "KBUILD_BUILD_USER=builder"
            echo "KBUILD_BUILD_HOST=github"
          } >>"$GITHUB_ENV"

      - name: Download sources
        working-directory: openwrt
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            make download -j"$(nproc)" V=s && break
            echo "Download attempt $attempt failed; retrying..."
            sleep 5
          done

      - name: Update and install feeds + disable packages
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          echo "### Usuwanie pakietów dahdi-linux i rtl8812au-ct ponieważ się nie kompilują ###"
          rm -rf package/feeds/telephony/dahdi-linux
          rm -rf package/kernel/rtl8812au-ct

      - name: Force BFD linker for libxdp in build_dir
        run: |
          echo "### Modyfikacja Makefile bezpośrednio w strukturze build_dir ###"

          # Szukamy pliku Makefile wewnątrz katalogu budowania xdp-tools
          find openwrt/build_dir/ -type f -path "*/xdp-tools-*/lib/libxdp/Makefile" | while read -r makefile; do
            echo "Modyfikuję plik: $makefile"

            # \044 to w zapisie oktalnym znak $ (dolar)
            # Dzięki temu shellcheck nie widzi fizycznego znaku dolara i nie zgłasza błędu SC2016,
            # a sed otrzyma dokładnie taką instrukcję, jakiej potrzebuje.
            sed -i 's|.*LD) -r -nostdlib -Wl,-z,noexecstack,--format=binary -o .*@ .*<|\t\044(LD) -r -nostdlib -Wl,-z,noexecstack -o \044@ \044< -fuse-ld=bfd|g' "$makefile"
          done

      - name: Build
        working-directory: openwrt
        run: |
          set -euo pipefail
          if ! make -j"$(nproc)"; then
            echo "::warning::Parallel build failed; retrying single-threaded for diagnostics"
            make -j1 V=s
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.config.outputs.device }}-${{ matrix.nss_version }}-images
          path: openwrt/bin/targets/qualcommax/ipq807x
          if-no-files-found: error
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Generate checksums
        working-directory: openwrt
        run: |
          cd bin/targets/qualcommax/ipq807x/

          # Czyścimy stare pliki sum, żeby nie liczyć skrótów z samych siebie
          rm -f md5sums sha256sums

          echo "### Generowanie sum kontrolnych dla obrazów i zawartości 'packages' ###"
          # Szukamy tylko rzeczywistych plików (-type f), ignorując katalogi jako obiekty
          find . -type f -print0 | xargs -0 md5sum > md5sums
          find . -type f -print0 | xargs -0 sha256sum > sha256sums

          echo "-> Sumy kontrolne zostały pomyślnie wygenerowane."

      - name: Pack APK Packages
        working-directory: openwrt
        run: |
          echo "### Pakowanie skompilowanych pakietów .apk ###"
          if [ -d "bin/packages" ]; then
            tar -czf bin/targets/qualcommax/ipq807x/compiled_packages.tar.gz -C bin packages
            echo "-> Pakiety zostały pomyślnie spakowane do compiled_packages.tar.gz"
          else
            echo "-> OSTRZEŻENIE: Nie znaleziono katalogu bin/packages!"
          fi

      - name: Publish release
        id: release
        run: |
          set -euo pipefail
          date=$(date -u +%F)
          timestamp=$(date -u +%Y%m%dT%H%M%SZ)

          tag_name="${RELEASE_PREFIX}-${timestamp}-${GITHUB_RUN_ID}"
          echo "release_tag=$tag_name" >>"$GITHUB_OUTPUT"

          {
            echo "## OpenWrt Build (${{ matrix.nss_version }})"
            echo "- **Date**: $date"
            echo "- **Device**: \`${DEVICE}\`"
            echo "- **NSS FW Flavor**: \`${{ matrix.nss_version }}\`"
            echo "- **Upstream**: \`${MAIN_SHA}\`"
            echo "- **NSS**: \`${NSS_SHA}\`"
            echo "- **Trigger**: \`${GITHUB_EVENT_NAME}\`"
            echo "- **Compiled by**: @Payti"
          } >release_notes.md

          mapfile -t assets < <(find openwrt/bin/targets/qualcommax/ipq807x/ -type f -not -path "*/packages/*")

          # Zmiana nazw plików binarnych (dodanie nss_12.5- lub nss_11.4- przed nazwą pliku)
          for asset in "${assets[@]}"; do
            dir=$(dirname "$asset")
            base=$(basename "$asset")
            mv "$asset" "$dir/${{ matrix.nss_version }}-$base"
          done
          mapfile -t renamed_assets < <(find openwrt/bin/targets/qualcommax/ipq807x/ -type f -not -path "*/packages/*")

          gh release create "$tag_name" \
            --repo "$GITHUB_REPOSITORY" \
            --title "OpenWrt Build $date (${{ matrix.nss_version }})" \
            --notes-file release_notes.md \
            --target "$GITHUB_SHA" \
            "${renamed_assets[@]}"

          {
            echo "## Release (${{ matrix.nss_version }})"
            echo "- tag: \`${tag_name}\`"
            echo "- assets: ${#renamed_assets[@]}"
          } >>"$GITHUB_STEP_SUMMARY"

  prune:
    name: Prune old releases
    needs: [config, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      KEEP: ${{ needs.config.outputs.release_keep }}
      CURRENT_TAG: ${{ needs.build.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/prune-releases.sh
